# Docker Compose para la parte opcional
services:
  # ── n8n: orquestador de workflows ──────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    # command: start --tunnel
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_ENCRYPTION_KEY=supersecretkey_12345
      - N8N_ENV_VARS_IN_ALLOWED_EXPRESSIONS=BOT_TOKEN,CHAT_ID,BOT_CONCIERTOS_TOKEN,CHAT_CONCIERTOS_ID,OPENAI_API_KEY,GEMINI_API_KEY,GROQ_API_KEY
      - BOT_TOKEN=${BOT_TOKEN}
      - CHAT_ID=${CHAT_ID}
      - BOT_CONCIERTOS_TOKEN=${BOT_CONCIERTOS_TOKEN}
      - CHAT_CONCIERTOS_ID=${CHAT_CONCIERTOS_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - scrapper
    networks:
      - agentes

  # ── poller: microservicio para interceptar Telegram Webhooks ────────────────
  poller:
    image: python:3.10-alpine
    container_name: telegram_poller
    command: sh -c "pip install requests && python -u /app/poller.py"
    volumes:
      - ./poller.py:/app/poller.py
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      - n8n
    networks:
      - agentes

  # ── Scrapper: API REST con FastAPI + Playwright ────────────────────────────
  scrapper:
    build:
      context: .
      dockerfile: Dockerfile.scrapper
    container_name: scrapper
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    networks:
      - agentes

  # ── MinIO: Almacenamiento S3 Local para la Cartelera ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Consola
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=supersecret
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - agentes

  # ── ComfyUI: Generación de Canciones con ACE-Step ──────────────────────────
  comfyui:
    image: yanwk/comfyui-boot:cpu
    container_name: comfyui
    ports:
      - "8188:8188"
    volumes:
      - ./data/comfyui/models:/root/ComfyUI/models
      - ./data/comfyui/output:/root/ComfyUI/output
      - ./data/comfyui/custom_nodes:/root/ComfyUI/custom_nodes
    environment:
      - CLI_ARGS=--listen --port 8188 --cpu
    networks:
      - agentes

volumes:
  n8n_data:

networks:
  agentes:
    driver: bridge
